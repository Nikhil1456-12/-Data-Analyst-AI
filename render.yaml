services:
  - type: web
    name: ai-data-analyst
    env: docker
    plan: free
    branch: main
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
